<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#050d1a"/>
  <!-- nucleus -->
  <circle cx="32" cy="32" r="6" fill="#ff4400">
    <animate attributeName="r" values="6;6.8;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- orbital ellipses -->
  <g fill="none" stroke="#00aaff" stroke-width="2" opacity="0.85">
    <ellipse cx="32" cy="32" rx="24" ry="9"/>
    <ellipse cx="32" cy="32" rx="24" ry="9" transform="rotate(60 32 32)"/>
    <ellipse cx="32" cy="32" rx="24" ry="9" transform="rotate(120 32 32)"/>
  </g>
  <!-- electron -->
  <circle cx="56" cy="32" r="3" fill="#00aaff"/>
</svg>
